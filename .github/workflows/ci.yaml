name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Build
        run: cargo build --workspace --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Run tests
        run: cargo test --workspace --all-features

  examples:
    name: Examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Run examples
        shell: bash
        run: |
          set -euo pipefail
          cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] as $package | $package.targets[] | select(.kind[] == "example") | [$package.name, .name] | @tsv' \
            | while IFS=$'\t' read -r package example; do
                cargo run -p "$package" --all-features --example "$example"
              done

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Run benchmarks
        run: cargo bench --workspace --all-features

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Run fmt
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
