name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider to test"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - anthropic
          - gemini
          - openai
          - openai-compat/all
          - openai-compat/cloudflare
          - openai-compat/generic

permissions:
  contents: read

jobs:
  anthropic:
    name: Anthropic
    if: inputs.provider == 'all' || inputs.provider == 'anthropic'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Run e2e tests
        run: cargo test -p anyllm-anthropic --test e2e -- --ignored --nocapture
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  gemini:
    name: Gemini
    if: inputs.provider == 'all' || inputs.provider == 'gemini'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Run e2e tests
        run: cargo test -p anyllm-gemini --test e2e -- --ignored --nocapture
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  openai:
    name: OpenAI
    if: inputs.provider == 'all' || inputs.provider == 'openai'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Run e2e tests
        run: cargo test -p anyllm-openai --test e2e -- --ignored --nocapture
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  openai-compat-cloudflare:
    name: OpenAI Compatible (Cloudflare)
    if: |
      inputs.provider == 'all' ||
      inputs.provider == 'openai-compat/all' ||
      inputs.provider == 'openai-compat/cloudflare'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Run e2e tests
        run: cargo test -p anyllm-openai-compat --test e2e_cloudflare -- --ignored --nocapture
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  openai-compat-generic:
    name: OpenAI Compatible (generic)
    if: |
      inputs.provider == 'all' ||
      inputs.provider == 'openai-compat/all' ||
      inputs.provider == 'openai-compat/generic'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Run e2e tests
        run: cargo test -p anyllm-openai-compat --test e2e -- --ignored --nocapture
        env:
          OPENAI_COMPAT_BASE_URL: https://models.github.ai/inference
          OPENAI_COMPAT_API_KEY: ${{ github.token }}
          OPENAI_COMPAT_MODEL: openai/gpt-4o-mini
